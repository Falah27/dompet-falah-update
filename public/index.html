<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Budget Bento</title>
<link rel="stylesheet" href="style.css">
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>
<div class="app">
  <nav class="sidebar">
    <h1 class="logo">🍱 Bento</h1>
    <button class="nav-btn active" data-page="dashboard"><span>🏠</span><small>Dashboard</small></button>
    <button class="nav-btn" data-page="dompet"><span>👛</span><small>Dompet</small></button>
    <button class="nav-btn" data-page="data"><span>📁</span><small>Data</small></button>
  </nav>

  <main class="content">
    <section id="page-dashboard" class="page active">
      <h2>Dashboard</h2>
      <div class="cards" id="summary-cards"></div>

      <details class="form-box" open>
        <summary>📝 Input Transaksi</summary>
        <form id="form-transaksi">
          <input type="date" id="in-tanggal" required>
          <select id="in-tipe">
            <option value="Pengeluaran">Pengeluaran</option>
            <option value="Pemasukan">Pemasukan</option>
          </select>
          <select id="in-kategori"></select>
          <input type="text" id="in-item" placeholder="Item" required>
          <input type="number" id="in-nominal" placeholder="Nominal" required>
          <select id="in-status">
            <option value="Lunas">Lunas</option>
            <option value="Belum Lunas">Belum Lunas</option>
          </select>
          <select id="in-metode"></select>
          <input type="text" id="in-keterangan" placeholder="Keterangan (opsional)">
          <button type="submit">💾 Simpan Transaksi</button>
        </form>
      </details>

      <details class="form-box">
        <summary>🔄 Transfer Internal & Tarik Tunai</summary>
        <form id="form-transfer">
          <input type="date" id="tf-tanggal" required>
          <select id="tf-source"></select>
          <select id="tf-target"></select>
          <input type="number" id="tf-nominal" placeholder="Nominal" required>
          <input type="text" id="tf-note" placeholder="Catatan">
          <button type="submit">✅ Proses Transfer</button>
        </form>
      </details>

      <div class="charts">
        <canvas id="chart-kategori"></canvas>
      </div>

      <div class="budget-box" id="budget-progress"></div>
      <div class="target-box" id="target-progress"></div>
    </section>

    <section id="page-dompet" class="page">
      <h2>Dompet Saya</h2>
      <div class="wallet-cards" id="wallet-cards"></div>
    </section>

    <section id="page-data" class="page">
      <h2>Data Lengkap</h2>
      <div class="tabs">
        <button class="tab-btn active" data-tab="tabel">📋 Tabel</button>
        <button class="tab-btn" data-tab="utang">💸 Kelola Utang</button>
      </div>

      <div id="tab-tabel" class="tab-content active">
        <input type="text" id="search-box" placeholder="Cari item...">
        <div class="table-wrap">
          <table id="data-table"><thead>
            <tr><th>Tanggal</th><th>Item</th><th>Kategori</th><th>Nominal</th><th>Tipe</th><th>Status</th></tr>
          </thead><tbody></tbody></table>
        </div>
      </div>

      <div id="tab-utang" class="tab-content">
        <p class="hint">Ubah status jadi "Lunas" dan pilih metode pembayaran, lalu klik simpan.</p>
        <div id="utang-list"></div>
      </div>
    </section>
  </main>
</div>
<script src="app.js"></script>
</body>
</html>
